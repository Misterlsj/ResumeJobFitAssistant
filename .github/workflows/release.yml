name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create release package
      run: |
        # Create a clean package without development files
        mkdir -p release
        cp -r background/ content-scripts/ popup/ settings/ sidebar/ assets/ release/
        cp manifest.json release/
        cp README.md LICENSE release/

        # Create ZIP file
        cd release
        zip -r ../ResumeJobFitAssistant-${{ steps.get_version.outputs.VERSION }}.zip .
        cd ..

    - name: Generate Release Notes
      id: release_notes
      run: |
        # Extract changelog for this version
        if [ -f CHANGELOG.md ]; then
          sed -n "/## \[${{ steps.get_version.outputs.VERSION }}\]/,/## \[/p" CHANGELOG.md | head -n -1 > release_notes.md
        else
          echo "Release ${{ steps.get_version.outputs.VERSION }}" > release_notes.md
        fi

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        release_name: Release ${{ steps.get_version.outputs.VERSION }}
        body_path: release_notes.md
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: https://uploads.github.com/repos/Misterlsj/ResumeJobFitAssistant/releases/${{ steps.get_version.outputs.VERSION }}/assets{?name,label}
        asset_path: ./ResumeJobFitAssistant-${{ steps.get_version.outputs.VERSION }}.zip
        asset_name: ResumeJobFitAssistant-${{ steps.get_version.outputs.VERSION }}.zip
        asset_content_type: application/zip
